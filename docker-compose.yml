version: '3.8'

services:
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - HOST=0.0.0.0
      - PORT=8080
      - DEBUG=true
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - LOCAL_AI_BASE_URL=${LOCAL_AI_BASE_URL:-http://localhost:11434}
      - LOCAL_AI_MODEL=${LOCAL_AI_MODEL:-llama2}
    volumes:
      - ./ai-service:/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  cli:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - ai-service
    environment:
      - DIFFAI_SERVICE_HOST=ai-service
      - DIFFAI_SERVICE_PORT=8080
    volumes:
      - .:/workspace
      - ~/.gitconfig:/root/.gitconfig:ro
    working_dir: /workspace
    command: ["tail", "-f", "/dev/null"]  # Keep container running
    restart: unless-stopped

networks:
  default:
    name: diffai-network
